name: Publish to NPM

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'package.json'

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Get package info
        id: pkg
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          NAME=$(node -p 'require("./package.json").name')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "📦 $NAME@$VERSION"

      - name: Check if version already published
        id: version-check
        run: |
          PUBLISHED=$(npm view ${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "${{ steps.pkg.outputs.version }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ Version ${{ steps.pkg.outputs.version }} already on npm — skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "✅ New version ${{ steps.pkg.outputs.version }}"
          fi

      - name: Create git tag
        if: steps.version-check.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ steps.pkg.outputs.version }}"
          git fetch --tags --force
          if git rev-parse "$TAG" >/dev/null 2>&1 || git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "⚠️ Tag $TAG already exists"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "✅ Tag $TAG created"
          fi

      - name: Publish to NPM
        if: steps.version-check.outputs.exists == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
