name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'test/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'test/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'

env:
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Unit Tests ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [18, 20, 22, 24, 25]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - uses: actions/cache@v4
        with:
          path: .jest-cache/unit
          key: jest-unit-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: jest-unit-${{ runner.os }}-node${{ matrix.node-version }}-

      - run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage (Node 20 only)
        uses: actions/upload-artifact@v4
        if: always() && matrix.node-version == 20
        with:
          name: coverage-report
          path: coverage/unit/coverage-summary.json
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-results-node${{ matrix.node-version }}
          path: test-results/junit-unit.xml
          retention-days: 14

  # ─── Integration Tests ───────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [18, 20, 22, 24, 25]
      fail-fast: false

    services:
      rabbitmq:
        image: rabbitmq:3.12-management-alpine
        ports:
          - 5672:5672
          - 15672:15672
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics check_port_connectivity"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 60s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - uses: actions/cache@v4
        with:
          path: .jest-cache/integration
          key: jest-integration-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: jest-integration-${{ runner.os }}-node${{ matrix.node-version }}-

      - run: npm ci

      - name: Wait for RabbitMQ
        run: |
          for i in $(seq 1 30); do
            if curl -u guest:guest -fs http://localhost:15672/api/overview > /dev/null 2>&1; then
              echo "✅ RabbitMQ ready"; exit 0
            fi
            [ $((i % 5)) -eq 0 ] && echo "  attempt $i/30..."
            sleep 2
          done
          echo "❌ RabbitMQ not ready after 60s"; exit 1

      - name: Run integration tests
        run: npm run test:integration
        env:
          RABBITMQ_URL: amqp://guest:guest@localhost:5672

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-results-node${{ matrix.node-version }}
          path: test-results/junit-integration.xml
          retention-days: 14

  # ─── Stress Tests ────────────────────────────────────────────────────────────
  stress-tests:
    name: Stress Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [unit-tests, integration-tests]

    services:
      rabbitmq:
        image: rabbitmq:3.12-management-alpine
        ports:
          - 5672:5672
          - 15672:15672
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics check_port_connectivity"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 60s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Wait for RabbitMQ
        run: |
          for i in $(seq 1 30); do
            if curl -u guest:guest -fs http://localhost:15672/api/overview > /dev/null 2>&1; then
              echo "✅ RabbitMQ ready"; exit 0
            fi
            [ $((i % 5)) -eq 0 ] && echo "  attempt $i/30..."
            sleep 2
          done
          echo "❌ RabbitMQ not ready"; exit 1

      - name: Run stress tests
        run: npm run test:stress
        env:
          RABBITMQ_URL: amqp://guest:guest@localhost:5672

      - name: Validate error rate (<1%)
        run: |
          if ls test-results/stress-*.json 1>/dev/null 2>&1; then
            FAILED=0
            for file in test-results/stress-*.json; do
              ERROR_RATE=$(node -p "const d=require('./$file'); d.errorRate||0" 2>/dev/null || echo "0")
              echo "$(basename $file): error rate = $ERROR_RATE%"
              if (( $(echo "$ERROR_RATE >= 1" | bc -l 2>/dev/null || echo "0") )); then
                echo "❌ Error rate exceeds 1%"; FAILED=$((FAILED+1))
              fi
            done
            [ $FAILED -eq 0 ] && echo "✅ All stress tests within threshold"
            exit $FAILED
          else
            echo "⚠️ No stress metrics found"
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-results
          path: test-results/stress-*.json
          retention-days: 30

  # ─── Benchmarks ──────────────────────────────────────────────────────────────
  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [unit-tests, integration-tests]

    services:
      rabbitmq:
        image: rabbitmq:3.12-management-alpine
        ports:
          - 5672:5672
          - 15672:15672
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics check_port_connectivity"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 60s

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Wait for RabbitMQ
        run: |
          for i in $(seq 1 30); do
            if curl -u guest:guest -fs http://localhost:15672/api/overview > /dev/null 2>&1; then
              echo "✅ RabbitMQ ready"; exit 0
            fi
            [ $((i % 5)) -eq 0 ] && echo "  attempt $i/30..."
            sleep 2
          done
          echo "❌ RabbitMQ not ready"; exit 1

      - name: Run benchmarks
        run: npm run test:benchmark
        env:
          RABBITMQ_URL: amqp://guest:guest@localhost:5672

      - name: Check for regressions
        run: |
          if [ -f "test/scripts/compare-benchmarks.js" ]; then
            node test/scripts/compare-benchmarks.js || echo "⚠️ Regression detected (non-blocking)"
          fi

      - name: Validate thresholds (≥100 msg/s, ≤1000ms latency)
        run: |
          if ls test-results/benchmark-*.json 1>/dev/null 2>&1; then
            FAILED=0
            for file in test-results/benchmark-*.json; do
              NAME=$(basename "$file" .json)
              THROUGHPUT=$(node -p "const d=require('./$file'); d.throughput||d.publishThroughput||d.consumeThroughput||0" 2>/dev/null || echo "0")
              LATENCY=$(node -p "const d=require('./$file'); d.avgLatency||d.latency?.avg||0" 2>/dev/null || echo "0")
              echo "$NAME: $THROUGHPUT msg/s, ${LATENCY}ms avg latency"
              if [ "$THROUGHPUT" != "0" ] && [ "$THROUGHPUT" != "NaN" ]; then
                if (( $(echo "$THROUGHPUT < 100" | bc -l 2>/dev/null || echo "0") )); then
                  echo "  ❌ Throughput below 100 msg/s"; FAILED=$((FAILED+1))
                fi
              fi
              if [ "$LATENCY" != "0" ] && [ "$LATENCY" != "NaN" ]; then
                if (( $(echo "$LATENCY > 1000" | bc -l 2>/dev/null || echo "0") )); then
                  echo "  ❌ Latency exceeds 1000ms"; FAILED=$((FAILED+1))
                fi
              fi
            done
            [ $FAILED -eq 0 ] && echo "✅ All benchmarks within thresholds"
            exit $FAILED
          else
            echo "⚠️ No benchmark results found"
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: test-results/benchmark-*.json
          retention-days: 90

  # ─── Build ───────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [stress-tests, benchmarks]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Verify dist/
        run: |
          echo "Main: $(node -p 'require("./package.json").main')"
          echo "Types: $(node -p 'require("./package.json").types')"
          ls -la dist/
          echo "✅ Build OK"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            package.json
            package-lock.json
            README.md
          retention-days: 7

  # ─── Publish ─────────────────────────────────────────────────────────────────
  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org/'
          cache: 'npm'

      - run: npm ci

      - name: Get package info
        id: pkg
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          NAME=$(node -p 'require("./package.json").name')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "📦 $NAME@$VERSION"

      - name: Check if version already published
        id: version-check
        run: |
          PUBLISHED=$(npm view ${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "${{ steps.pkg.outputs.version }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ Version ${{ steps.pkg.outputs.version }} already on npm — skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "✅ New version ${{ steps.pkg.outputs.version }}"
          fi

      - name: Create git tag
        if: steps.version-check.outputs.exists == 'false'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ steps.pkg.outputs.version }}"
          git fetch --tags --force
          if git rev-parse "$TAG" >/dev/null 2>&1 || git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "⚠️ Tag $TAG already exists"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git "$TAG"
            echo "✅ Tag $TAG created"
          fi

      - name: Publish to NPM
        if: steps.version-check.outputs.exists == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Summary ─────────────────────────────────────────────────────────────────
  summary:
    name: CI/CD Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, stress-tests, benchmarks, build, publish]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
        continue-on-error: true

      - name: Write summary
        run: |
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const out = [];
          const push = (s = '') => out.push(s);

          // ── helpers ──────────────────────────────────────────────────────────
          function jobIcon(result) {
            return result === 'success' ? '✅' : result === 'skipped' ? '⏭️' : result === 'failure' ? '❌' : '⚠️';
          }

          function parseJUnit(file) {
            try {
              const xml = fs.readFileSync(file, 'utf8');
              const suites = [...xml.matchAll(/<testsuite[^>]*name="([^"]*)"[^>]*tests="(\d+)"[^>]*failures="(\d+)"[^>]*errors="(\d+)"[^>]*(?:time="([^"]*)")?[^>]*>/g)];
              const cases  = [...xml.matchAll(/<testcase[^>]*name="([^"]*)"[^>]*(?:classname="([^"]*)")?[^>]*(?:time="([^"]*)")?[^>]*(?:\/>|>[\s\S]*?<\/testcase>)/g)];
              const failed = [...xml.matchAll(/<testcase[^>]*name="([^"]*)"[\s\S]*?<(?:failure|error)[^>]*(?:message="([^"]*)")?/g)];
              return { suites, cases, failed, raw: xml };
            } catch { return null; }
          }

          function readJson(file) {
            try { return JSON.parse(fs.readFileSync(file, 'utf8')); } catch { return null; }
          }

          function artifactDir(...parts) {
            const p = path.join('artifacts', ...parts);
            return fs.existsSync(p) ? p : null;
          }

          // ── Pipeline status ───────────────────────────────────────────────────
          push('# 🚀 CI/CD Pipeline Summary');
          push('');
          push('| Job | Result |');
          push('|-----|--------|');
          const jobs = [
            ['Unit Tests',        '${{ needs.unit-tests.result }}'],
            ['Integration Tests', '${{ needs.integration-tests.result }}'],
            ['Stress Tests',      '${{ needs.stress-tests.result }}'],
            ['Benchmarks',        '${{ needs.benchmarks.result }}'],
            ['Build',             '${{ needs.build.result }}'],
            ['Publish',           '${{ needs.publish.result }}'],
          ];
          for (const [name, result] of jobs) {
            push(`| ${name} | ${jobIcon(result)} ${result} |`);
          }
          push('');
          push(`> **Branch:** \`${{ github.ref_name }}\` &nbsp;|&nbsp; **Commit:** \`${{ github.sha }}\` &nbsp;|&nbsp; **Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`);

          // ── Unit Tests detail ─────────────────────────────────────────────────
          push('');
          push('## 🧪 Unit Tests');
          const nodeVersions = [18, 20, 22, 24, 25];
          let unitTotals = { tests: 0, failures: 0, errors: 0, time: 0, nodes: 0 };
          const unitRows = [];
          for (const v of nodeVersions) {
            const dir = artifactDir(`unit-results-node${v}`);
            const file = dir ? path.join(dir, 'junit-unit.xml') : null;
            const data = file && fs.existsSync(file) ? parseJUnit(file) : null;
            if (data) {
              let tests = 0, failures = 0, errors = 0, time = 0;
              for (const s of data.suites) {
                tests    += parseInt(s[2]) || 0;
                failures += parseInt(s[3]) || 0;
                errors   += parseInt(s[4]) || 0;
                time     += parseFloat(s[5]) || 0;
              }
              const passed = tests - failures - errors;
              const icon = failures + errors > 0 ? '❌' : '✅';
              unitRows.push(`| Node ${v} | ${icon} | ${passed} | ${failures + errors} | ${tests} | ${time.toFixed(2)}s |`);
              unitTotals.tests    += tests;
              unitTotals.failures += failures + errors;
              unitTotals.time     += time;
              unitTotals.nodes++;
            } else {
              unitRows.push(`| Node ${v} | ⚠️ | — | — | — | — |`);
            }
          }
          push('| Node | Status | Passed | Failed | Total | Time |');
          push('|------|--------|--------|--------|-------|------|');
          unitRows.forEach(r => push(r));
          if (unitTotals.nodes > 0) {
            push('');
            push(`**Totals across all nodes:** ${unitTotals.tests - unitTotals.failures} passed, ${unitTotals.failures} failed, ${unitTotals.tests} total — ${unitTotals.time.toFixed(2)}s`);
          }

          // ── Integration Tests detail ──────────────────────────────────────────
          push('');
          push('## 🔗 Integration Tests');
          const intRows = [];
          let intTotals = { tests: 0, failures: 0, time: 0, nodes: 0 };
          for (const v of nodeVersions) {
            const dir = artifactDir(`integration-results-node${v}`);
            const file = dir ? path.join(dir, 'junit-integration.xml') : null;
            const data = file && fs.existsSync(file) ? parseJUnit(file) : null;
            if (data) {
              let tests = 0, failures = 0, errors = 0, time = 0;
              for (const s of data.suites) {
                tests    += parseInt(s[2]) || 0;
                failures += parseInt(s[3]) || 0;
                errors   += parseInt(s[4]) || 0;
                time     += parseFloat(s[5]) || 0;
              }
              const passed = tests - failures - errors;
              const icon = failures + errors > 0 ? '❌' : '✅';
              intRows.push(`| Node ${v} | ${icon} | ${passed} | ${failures + errors} | ${tests} | ${time.toFixed(2)}s |`);
              intTotals.tests    += tests;
              intTotals.failures += failures + errors;
              intTotals.time     += time;
              intTotals.nodes++;
            } else {
              intRows.push(`| Node ${v} | ⚠️ | — | — | — | — |`);
            }
          }
          push('| Node | Status | Passed | Failed | Total | Time |');
          push('|------|--------|--------|--------|-------|------|');
          intRows.forEach(r => push(r));
          if (intTotals.nodes > 0) {
            push('');
            push(`**Totals across all nodes:** ${intTotals.tests - intTotals.failures} passed, ${intTotals.failures} failed, ${intTotals.tests} total — ${intTotals.time.toFixed(2)}s`);
          }

          // ── Stress Tests detail ───────────────────────────────────────────────
          push('');
          push('## 💪 Stress Tests');
          const stressDir = artifactDir('stress-results');
          if (stressDir) {
            const files = fs.readdirSync(stressDir).filter(f => f.endsWith('.json'));
            if (files.length > 0) {
              push('| Test | Messages | Error Rate | Duration | Status |');
              push('|------|----------|------------|----------|--------|');
              for (const f of files) {
                const d = readJson(path.join(stressDir, f));
                if (d) {
                  const errRate = d.errorRate ?? 'N/A';
                  const msgs    = d.totalMessages ?? d.messagesSent ?? 'N/A';
                  const dur     = d.duration ? `${d.duration}ms` : 'N/A';
                  const icon    = typeof errRate === 'number' && errRate < 1 ? '✅' : '❌';
                  push(`| ${f.replace('.json','')} | ${msgs} | ${typeof errRate === 'number' ? errRate.toFixed(2)+'%' : errRate} | ${dur} | ${icon} |`);
                }
              }
            } else {
              push('_No stress result files found._');
            }
          } else {
            push('_No stress results artifact._');
          }

          // ── Benchmarks detail ─────────────────────────────────────────────────
          push('');
          push('## ⚡ Performance Benchmarks');
          const benchDir = artifactDir('benchmark-results');
          if (benchDir) {
            const files = fs.readdirSync(benchDir).filter(f => f.endsWith('.json'));
            if (files.length > 0) {
              push('| Benchmark | Throughput | Avg Latency | P95 Latency | P99 Latency | Status |');
              push('|-----------|------------|-------------|-------------|-------------|--------|');
              for (const f of files) {
                const d = readJson(path.join(benchDir, f));
                if (d) {
                  const tp  = d.throughput ?? d.publishThroughput ?? d.consumeThroughput ?? 'N/A';
                  const avg = d.avgLatency ?? d.latency?.avg ?? 'N/A';
                  const p95 = d.p95Latency ?? d.latency?.p95 ?? 'N/A';
                  const p99 = d.p99Latency ?? d.latency?.p99 ?? 'N/A';
                  const ok  = (typeof tp === 'number' && tp >= 100) && (typeof avg === 'number' && avg <= 1000);
                  const icon = ok ? '✅' : typeof tp === 'number' || typeof avg === 'number' ? '❌' : '⚠️';
                  push(`| ${f.replace('.json','')} | ${typeof tp === 'number' ? tp.toFixed(0)+' msg/s' : tp} | ${typeof avg === 'number' ? avg.toFixed(1)+'ms' : avg} | ${typeof p95 === 'number' ? p95.toFixed(1)+'ms' : p95} | ${typeof p99 === 'number' ? p99.toFixed(1)+'ms' : p99} | ${icon} |`);
                }
              }
            } else {
              push('_No benchmark result files found._');
            }
          } else {
            push('_No benchmark results artifact._');
          }

          // ── Coverage ──────────────────────────────────────────────────────────
          push('');
          push('## 📊 Coverage (Node 20)');
          const covFile = path.join('artifacts', 'coverage-report', 'coverage-summary.json');
          if (fs.existsSync(covFile)) {
            const cov = readJson(covFile);
            if (cov && cov.total) {
              const t = cov.total;
              push('| Metric | % | Covered | Total |');
              push('|--------|---|---------|-------|');
              for (const k of ['statements', 'branches', 'functions', 'lines']) {
                const m = t[k];
                const bar = '█'.repeat(Math.round((m.pct||0)/10)) + '░'.repeat(10 - Math.round((m.pct||0)/10));
                push(`| ${k.charAt(0).toUpperCase()+k.slice(1)} | ${bar} ${m.pct}% | ${m.covered} | ${m.total} |`);
              }
              // Per-file breakdown (top 10 lowest coverage)
              const files = Object.entries(cov)
                .filter(([k]) => k !== 'total')
                .map(([k, v]) => ({ file: k.replace(process.cwd()+'/', ''), pct: v.lines?.pct ?? 0 }))
                .sort((a, b) => a.pct - b.pct)
                .slice(0, 10);
              if (files.length > 0) {
                push('');
                push('<details><summary>📁 10 files with lowest line coverage</summary>');
                push('');
                push('| File | Lines % |');
                push('|------|---------|');
                files.forEach(f => push(`| \`${f.file}\` | ${f.pct}% |`));
                push('');
                push('</details>');
              }
            }
          } else {
            push('_Coverage report not available._');
          }

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, out.join('\n') + '\n');
          EOF

