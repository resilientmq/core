name: CI

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'test/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/**'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'test/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/**'

jobs:
  # ─── Unit Tests ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [18, 20, 22, 24]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Cache Jest
        uses: actions/cache@v4
        with:
          path: .jest-cache/unit
          key: jest-unit-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: jest-unit-${{ runner.os }}-node${{ matrix.node-version }}-

      - run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Check coverage threshold (≥70%)
        run: |
          SUMMARY="coverage/unit/coverage-summary.json"
          if [ ! -f "$SUMMARY" ]; then
            echo "⚠️  Coverage file not found, skipping check"
            exit 0
          fi
          LINES=$(node -p "require('./$SUMMARY').total.lines.pct")
          echo "Lines: $LINES%"
          if (( $(echo "$LINES < 70" | bc -l) )); then
            echo "❌ Line coverage ($LINES%) below 70% threshold"
            exit 1
          fi
          echo "✅ Coverage OK ($LINES%)"

      - name: Upload coverage (Node 20 only)
        uses: actions/upload-artifact@v4
        if: always() && matrix.node-version == 20
        with:
          name: coverage-report
          path: coverage/unit/coverage-summary.json
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-results-node${{ matrix.node-version }}
          path: test-results/junit-unit.xml
          retention-days: 14

  # ─── Integration Tests ────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [18, 20, 22, 24]
      fail-fast: false

    services:
      rabbitmq:
        image: rabbitmq:3.12-management-alpine
        ports:
          - 5672:5672
          - 15672:15672
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics check_port_connectivity"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 60s

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Cache Jest
        uses: actions/cache@v4
        with:
          path: .jest-cache/integration
          key: jest-integration-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: jest-integration-${{ runner.os }}-node${{ matrix.node-version }}-

      - run: npm ci

      - name: Wait for RabbitMQ
        run: |
          echo "Waiting for RabbitMQ..."
          for i in $(seq 1 30); do
            if curl -u guest:guest -fs http://localhost:15672/api/overview > /dev/null 2>&1; then
              echo "✅ RabbitMQ ready"
              exit 0
            fi
            [ $((i % 5)) -eq 0 ] && echo "  attempt $i/30..."
            sleep 2
          done
          echo "❌ RabbitMQ not ready after 60s"
          exit 1

      - name: Run integration tests
        run: npm run test:integration
        env:
          RABBITMQ_URL: amqp://guest:guest@localhost:5672

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-results-node${{ matrix.node-version }}
          path: test-results/junit-integration.xml
          retention-days: 14

  # ─── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Verify dist/
        run: |
          echo "Main: $(node -p 'require("./package.json").main')"
          echo "Types: $(node -p 'require("./package.json").types')"
          ls -la dist/
          echo "✅ Build OK"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            package.json
            package-lock.json
            README.md
          retention-days: 7

  # ─── Summary ──────────────────────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, build]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
        continue-on-error: true

      - name: Write summary
        run: |
          {
            echo "# CI Summary"
            echo ""
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |"
            echo "| Integration Tests | ${{ needs.integration-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |"
            echo "| Build | ${{ needs.build.result == 'success' && '✅ Passed' || needs.build.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |"
            echo ""

            SUMMARY="coverage-report/coverage-summary.json"
            if [ -f "$SUMMARY" ]; then
              LINES=$(node -e "try{const d=require('./$SUMMARY');process.stdout.write(String(d.total.lines.pct))}catch(e){process.stdout.write('N/A')}")
              BRANCHES=$(node -e "try{const d=require('./$SUMMARY');process.stdout.write(String(d.total.branches.pct))}catch(e){process.stdout.write('N/A')}")
              FUNCTIONS=$(node -e "try{const d=require('./$SUMMARY');process.stdout.write(String(d.total.functions.pct))}catch(e){process.stdout.write('N/A')}")
              STATEMENTS=$(node -e "try{const d=require('./$SUMMARY');process.stdout.write(String(d.total.statements.pct))}catch(e){process.stdout.write('N/A')}")
              echo "## Coverage (Unit Tests)"
              echo ""
              echo "| Metric | % |"
              echo "|--------|---|"
              echo "| Lines | ${LINES}% |"
              echo "| Branches | ${BRANCHES}% |"
              echo "| Functions | ${FUNCTIONS}% |"
              echo "| Statements | ${STATEMENTS}% |"
            else
              echo "## Coverage"
              echo "⚠️ Coverage report not available"
            fi

            echo ""
            echo "**Branch:** \`${{ github.ref_name }}\`  "
            echo "**Commit:** \`${{ github.sha }}\`  "
            echo "**Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } >> $GITHUB_STEP_SUMMARY
